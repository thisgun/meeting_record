name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: PHP 설정
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: 패키징 스모크 검사
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-dotenv requests
          python -m pip install -e . --no-deps
          python - <<'PY'
          from importlib.metadata import entry_points
          from src.g5_client import G5MeetingApiClient, G5MettingApiClient

          expected = {
              "meeting-record",
              "meeting-doctor",
              "meeting-export",
              "meeting-search",
              "meeting-stats",
              "meeting-compare",
              "meeting-dict",
              "meeting-enroll",
              "meeting-watch",
          }
          installed = {ep.name for ep in entry_points(group="console_scripts")}
          missing = expected - installed
          assert not missing, f"missing console scripts: {sorted(missing)}"
          assert G5MettingApiClient is G5MeetingApiClient
          PY

      - name: Python 문법 검사
        run: python -m compileall -q .

      - name: PII 마스킹 샘플 테스트
        run: python scripts/test_pii.py

      - name: SQLite 저장소 스모크 테스트
        run: |
          python - <<'PY'
          import tempfile
          from pathlib import Path
          from src import storage

          db_path = Path(tempfile.mkdtemp()) / "meetings.db"
          meeting_id = storage.save_meeting(
              db_path,
              source_file="sample.mp3",
              title="샘플 회의",
              summary_md="## 요약\n- 테스트",
              duration_sec=12.3,
              utterances=[
                  {"speaker": "SPEAKER_00", "start": 0, "end": 2, "text": "안녕하세요"},
                  {"speaker": "SPEAKER_01", "start": 2, "end": 5, "text": "반갑습니다"},
              ],
          )
          meeting = storage.get_meeting(db_path, meeting_id)
          assert meeting is not None
          assert meeting["meeting"]["title"] == "샘플 회의"
          assert len(meeting["utterances"]) == 2
          assert storage.search_meetings(db_path, "테스트")
          assert storage.search_utterances(db_path, "반갑습니다")
          storage.mark_meeting_synced(db_path, meeting_id, "8", target_name="ci", primary=True)
          assert storage.get_meeting_target(db_path, meeting_id, "ci")["sync_status"] == "synced"
          PY

      - name: PHP 문법 검사
        run: |
          find g5_meeting_api/plugin/meeting_api -name '*.php' -print0 \
            | xargs -0 -n1 php -l
