name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quick-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: PHP 설정
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: 패키징 스모크 검사
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-dotenv requests pytest
          python -m pip install -e . --no-deps
          python - <<'PY'
          from importlib.metadata import entry_points
          from src.g5_client import G5MeetingApiClient, G5MettingApiClient

          expected = {
              "meeting-record",
              "meeting-doctor",
              "meeting-export",
              "meeting-search",
              "meeting-stats",
              "meeting-compare",
              "meeting-dict",
              "meeting-enroll",
              "meeting-watch",
          }
          installed = {ep.name for ep in entry_points(group="console_scripts")}
          missing = expected - installed
          assert not missing, f"missing console scripts: {sorted(missing)}"
          assert G5MettingApiClient is G5MeetingApiClient
          PY

      - name: Python 문법 검사
        run: python -m compileall -q .

      - name: 단위 테스트
        run: python -m pytest -q

      - name: PHP 문법 검사
        run: |
          find g5_meeting_api/plugin/meeting_api -name '*.php' -print0 \
            | xargs -0 -n1 php -l
